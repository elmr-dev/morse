<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morse — CW in your browser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <script>
      (() => {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var dark = stored === 'dark' || (stored !== 'light' && prefersDark);
        if (dark) document.documentElement.classList.add('dark');
        // Paint the themed background immediately so there's no white flash
        // before the CSS bundle and React mount.
        document.documentElement.style.backgroundColor = dark
          ? 'oklch(0.1743 0.0227 283.7998)'
          : 'oklch(0.93 0.006 286.15)';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
